name: Zip Release

on:
  release:
    types: [published]

jobs:
  release-zip:
    name: Perform Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Zip
        run: |
          cd ./custom_components/british_gas
          zip -r ha-british-gas-payg.zip .

      - name: Upload Zip to Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          files: ./custom_components/british_gas/ha-british-gas-payg.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}